  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --section-width: 2534.2857;
    --design-width: 14080;
    --design-height: 360;
    --content-top: 51.0281px;
    --top-align-small: -14px;
    --top-align-large: -40px;
    --top-align-arrow: -14px;
    --divider-height: 308.9719px;
    --section-right-pad: 98.5133px;
    --bar-bg: #111111;
    --divider: rgb(100, 99, 96);
    --up: rgb(3, 150, 72);
    --down: rgb(227, 41, 38);
    --label: #ffffff;
    --value: #ffffff;
  }

  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: var(--bar-bg);
    font-family: "MORN Intrinsic Web Regular", sans-serif;
    font-kerning: normal;
    font-feature-settings: "kern" 1;
    text-rendering: optimizeLegibility;
  }

  body {
    display: block;
    position: relative;
  }

  .preview-shell {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    position: relative;
    margin: 0;
    padding: 0;
  }

  .preview-scale {
    position: absolute;
    top: 0;
    left: 0;
    transform-origin: top left;
    will-change: transform;
  }

  .ticker-stage {
    width: 14080px;
    min-width: 14080px;
    max-width: none;
    height: 360px;
    min-height: 360px;
    max-height: 360px;
    margin: 0;
    padding: 0;
    display: block;
    position: relative;
    top: 0;
    left: 0;
    overflow: hidden;
  }

  .ticker-canvas {
    width: 14080px;
    min-width: 14080px;
    max-width: none;
    height: 360px;
    min-height: 360px;
    max-height: 360px;
    will-change: transform;
    overflow: hidden;
    position: relative;
    top: 0;
    left: 0;
  }

  .ticker-bar {
    display: flex;
    align-items: stretch;
    width: max-content;
    height: calc(var(--design-height) * 1px);
    will-change: transform;
  }

  .ticker-item {
    width: calc(var(--section-width) * 1px);
    min-width: calc(var(--section-width) * 1px);
    height: calc(var(--design-height) * 1px);
    flex: 0 0 auto;
    position: relative;
    transition: background 0.2s;
    cursor: default;
  }

  .ticker-item::after {
    content: "";
    position: absolute;
    right: 0;
    top: var(--content-top);
    width: 7px;
    height: var(--divider-height);
    background: var(--divider);
  }

  .ticker-item:first-child::before {
    content: "";
    position: absolute;
    left: 0;
    top: var(--content-top);
    width: 7px;
    height: var(--divider-height);
    background: var(--divider);
  }

  .ticker-content {
    position: absolute;
    top: var(--content-top);
    left: 0;
    right: var(--section-right-pad);
    display: grid;
    align-items: start;
    grid-template-columns: 683.3563px 54.0936px minmax(0, 1fr) max-content 98.5133px 625.1313px 98.5133px max-content 38.3596px 66px;
  }

  .ticker-label {
    grid-column: 1;
    font-family: "MORN Intrinsic Web Bold", sans-serif;
    font-weight: 700;
    font-size: 90px;
    color: var(--label);
    letter-spacing: 1px;
    line-height: 108px;
    text-align: right;
    transform: translateY(var(--top-align-small));
  }

  .ticker-value {
    grid-column: 4;
    font-family: "MORN Intrinsic Web Regular", sans-serif;
    font-weight: 400;
    font-size: 235px;
    color: var(--value);
    letter-spacing: -2px;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    text-align: right;
    justify-self: end;
    transform: translateY(var(--top-align-large));
  }

  .spark-wrap {
    grid-column: 6;
    width: 625.1313px;
    height: 220px;
    justify-self: center;
  }

  .chart-spark {
    width: 625.1313px;
    height: 220px;
    margin-top: 0;
  }

  .ticker-change {
    grid-column: 8;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    line-height: 1;
    text-align: right;
    transform: translateY(var(--top-align-small));
  }

  .change-abs {
    font-family: "MORN Intrinsic Web Regular", sans-serif;
    font-weight: 400;
    font-size: 90px;
    line-height: 108px;
    font-variant-numeric: tabular-nums;
  }
  .change-pct {
    display: inline-flex;
    justify-content: flex-end;
    align-items: flex-start;
    font-family: "MORN Intrinsic Web Regular", sans-serif;
    font-weight: 400;
    font-size: 90px;
    line-height: 108px;
    font-variant-numeric: tabular-nums;
    opacity: 0.85;
  }

  .pct-open {
    margin-left: -0.14em;
  }

  .pct-close {
    margin-right: -0.22em;
  }

  .arrow {
    grid-column: 10;
    width: 66px;
    display: inline-flex;
    align-items: flex-start;
    justify-content: center;
    font-size: 92px;
    line-height: 108px;
    transform: translateY(var(--top-align-arrow));
  }

  .up { color: var(--up); }
  .down { color: var(--down); }
</style>
</head>
<body>
<div class="preview-shell">
  <div class="preview-scale" id="previewScale">
    <div class="ticker-stage">
      <div class="ticker-canvas" id="tickerCanvas">
        <div class="ticker-bar" id="tickerBar"></div>
      </div>
    </div>
  </div>
</div>

<script>
const ENABLE_PREVIEW_SCALE = true;
const SECTION_WIDTH = 2534.2857;
const DESIGN_WIDTH = 14080;
const DESIGN_HEIGHT = 360;
const tickers = [
  { label: "Djia",                        value: 47658, change: -41.72, pct: -0.09, trend: "down" },
  { label: "S&P 500",                     value:  6853, change:  +6.71, pct: +0.10, trend: "up"   },
  { label: "Nasdaq",                      value: 47658, change: -81.72, pct: -0.17, trend: "down" },
  { label: "Morningstar US Market",       value: 47658, change: -81.72, pct: -0.17, trend: "down" },
  { label: "Morningstar Wide Moat Focus", value:  6853, change:  +6.71, pct: +0.10, trend: "up"   },
  { label: "Morningstar Global Markets",  value:  6853, change:  +6.71, pct: +0.10, trend: "up"   },
  { label: "Lumexa Imaging Holdings Inc", value: 47658, change: -81.72, pct: -0.25, trend: "down" },
];
document.documentElement.style.setProperty('--section-width', SECTION_WIDTH);
document.documentElement.style.setProperty('--design-width', DESIGN_WIDTH);
document.documentElement.style.setProperty('--design-height', DESIGN_HEIGHT);

function applyPreviewScale() {
  const scaleWrap = document.getElementById('previewScale');
  if (!scaleWrap) return;
  if (!ENABLE_PREVIEW_SCALE) {
    scaleWrap.style.transform = 'scale(1)';
    scaleWrap.style.width = `${DESIGN_WIDTH}px`;
    scaleWrap.style.height = `${DESIGN_HEIGHT}px`;
    return;
  }
  const scale = Math.min(window.innerWidth / DESIGN_WIDTH, window.innerHeight / DESIGN_HEIGHT);
  scaleWrap.style.transform = `scale(${scale})`;
  scaleWrap.style.width = `${DESIGN_WIDTH}px`;
  scaleWrap.style.height = `${DESIGN_HEIGHT}px`;
}

function generateSparkPath(trend, w, h, points = 20) {
  const pts = [];
  let y = h / 2;
  for (let i = 0; i < points; i++) {
    y += (Math.random() - (trend === 'up' ? 0.42 : 0.58)) * (h * 0.18);
    y = Math.max(4, Math.min(h - 4, y));
    pts.push([i * (w / (points - 1)), y]);
  }
  return "M " + pts.map(p => p.join(",")).join(" L ");
}

function makeSvgSpark(trend, w = 625.1313, h = 220) {
  const color = trend === 'up' ? '#039648' : '#e32926';
  const path = generateSparkPath(trend, w, h);
  const fillPath = path + ` L ${w},${h} L 0,${h} Z`;
  const gradId = `grad_${trend}_${Math.random().toString(36).slice(2)}`;
  return `
    <svg class="chart-spark" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${color}" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="${fillPath}" fill="url(#${gradId})" />
      <path d="${path}" fill="none" stroke="${color}" stroke-width="4" stroke-linejoin="round"/>
    </svg>`;
}

function normalizeTickerData(input) {
  if (!Array.isArray(input)) return [];
  return input.map((t, idx) => ({
    label: String(t.label ?? `Ticker ${idx + 1}`),
    value: Number(t.value ?? 0),
    change: Number(t.change ?? 0),
    pct: Number(t.pct ?? 0),
    trend: (t.trend === 'up' || t.trend === 'down')
      ? t.trend
      : (Number(t.change ?? 0) >= 0 ? 'up' : 'down')
  }));
}

function formatPrice(value) {
  return Math.round(value).toLocaleString();
}

function formatSignedChange(value) {
  const sign = value >= 0 ? '+' : '-';
  return `${sign}${Math.abs(value).toFixed(2)}`;
}

function formatSignedPct(value) {
  const sign = value >= 0 ? '+' : '-';
  return `${sign}${Math.abs(value).toFixed(2)}%`;
}

function animateTickerValue(el, fromValue, toValue, durationMs = 1500) {
  const from = Math.round(fromValue);
  const to = Math.round(toValue);
  if (from === to) {
    el.textContent = formatPrice(to);
    return;
  }
  const start = performance.now();
  function tick(now) {
    const t = Math.min((now - start) / durationMs, 1);
    const eased = 1 - Math.pow(1 - t, 3);
    const current = Math.round(from + (to - from) * eased);
    el.textContent = formatPrice(current);
    if (t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function animateMetricValue(el, fromValue, toValue, formatter, durationMs = 1500) {
  const from = Number(fromValue);
  const to = Number(toValue);
  if (Math.abs(from - to) < 0.005) {
    el.textContent = formatter(to);
    return;
  }
  const start = performance.now();
  function tick(now) {
    const t = Math.min((now - start) / durationMs, 1);
    const eased = 1 - Math.pow(1 - t, 3);
    const current = from + (to - from) * eased;
    el.textContent = formatter(current);
    if (t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function simulateMockStep(arr) {
  return arr.map(t => {
    const delta = (Math.random() - 0.5) * 2;
    const priceStep = Math.max(1, Math.round(t.value * 0.0002));
    const nextValue = Math.max(0, Math.round(t.value + delta * priceStep));
    const nextChange = parseFloat((t.change + delta * 0.15).toFixed(2));
    const nextPct = parseFloat(((nextChange / Math.max(nextValue, 1)) * 100).toFixed(2));
    const nextTrend = nextChange >= 0 ? 'up' : 'down';
    return { ...t, value: nextValue, change: nextChange, pct: nextPct, trend: nextTrend };
  });
}

let liveData = normalizeTickerData(tickers);
let mockTimerId = null;
const displayedValueByIndex = new Map();
const displayedChangeByIndex = new Map();
const displayedPctByIndex = new Map();
const pixelsPerSecond = 40;
let cycleWidth = 0;
let crawlOffset = 0;
let crawlRafId = 0;
let crawlLastTs = 0;

function setTickerData(nextData) {
  const normalized = normalizeTickerData(nextData);
  if (!normalized.length) return;
  liveData = normalized;
  renderTicker(liveData);
}

function startMockUpdates(intervalMs = 3000) {
  stopMockUpdates();
  mockTimerId = setInterval(() => {
    setTickerData(simulateMockStep(liveData));
  }, intervalMs);
}

function stopMockUpdates() {
  if (mockTimerId) clearInterval(mockTimerId);
  mockTimerId = null;
}

window.setTickerData = setTickerData;
window.startMockUpdates = startMockUpdates;
window.stopMockUpdates = stopMockUpdates;

setTickerData(tickers);
startMockUpdates(3000);

function renderTicker(data) {
  const bar = document.getElementById('tickerBar');
  const renderedData = data.concat(data);
  bar.innerHTML = renderedData.map((t, idx) => {
    const sourceIdx = idx % data.length;
    const dir = t.trend;
    const cls = dir === 'up' ? 'up' : 'down';
    const arrow = dir === 'up' ? '▲' : '▼';
    const spark = makeSvgSpark(dir);
    return `
      <div class="ticker-item">
        <div class="ticker-content">
          <div class="ticker-label">${t.label}</div>
          <div class="ticker-value" data-idx="${sourceIdx}">${formatPrice(t.value)}</div>
          <div class="spark-wrap">${spark}</div>
          <div class="ticker-change ${cls}">
            <span class="change-abs"><span class="change-abs-val" data-idx="${sourceIdx}">${formatSignedChange(t.change)}</span></span>
            <span class="change-pct"><span class="pct-open">(</span><span class="pct-core" data-idx="${sourceIdx}">${formatSignedPct(t.pct)}</span><span class="pct-close">)</span></span>
          </div>
          <span class="arrow ${cls}">${arrow}</span>
        </div>
      </div>`;
  }).join('');

  cycleWidth = SECTION_WIDTH * data.length;
  bar.style.width = `${SECTION_WIDTH * renderedData.length}px`;
  bar.style.transform = `translateX(${-crawlOffset}px)`;

  const valueEls = bar.querySelectorAll('.ticker-value');
  valueEls.forEach((el, idx) => {
    const sourceIdx = idx % data.length;
    const target = Math.round(data[sourceIdx].value);
    const from = displayedValueByIndex.has(sourceIdx) ? displayedValueByIndex.get(sourceIdx) : target;
    animateTickerValue(el, from, target);
    displayedValueByIndex.set(sourceIdx, target);
  });

  const changeEls = bar.querySelectorAll('.change-abs-val');
  changeEls.forEach((el, idx) => {
    const sourceIdx = idx % data.length;
    const target = Number(data[sourceIdx].change);
    const from = displayedChangeByIndex.has(sourceIdx) ? displayedChangeByIndex.get(sourceIdx) : target;
    animateMetricValue(el, from, target, formatSignedChange);
    displayedChangeByIndex.set(sourceIdx, target);
  });

  const pctEls = bar.querySelectorAll('.pct-core');
  pctEls.forEach((el, idx) => {
    const sourceIdx = idx % data.length;
    const target = Number(data[sourceIdx].pct);
    const from = displayedPctByIndex.has(sourceIdx) ? displayedPctByIndex.get(sourceIdx) : target;
    animateMetricValue(el, from, target, formatSignedPct);
    displayedPctByIndex.set(sourceIdx, target);
  });
}

function stepCrawl(ts) {
  if (!crawlLastTs) crawlLastTs = ts;
  const dt = (ts - crawlLastTs) / 1000;
  crawlLastTs = ts;
  crawlOffset += pixelsPerSecond * dt;
  if (cycleWidth > 0 && crawlOffset >= cycleWidth) {
    crawlOffset -= cycleWidth;
  }
  const bar = document.getElementById('tickerBar');
  if (bar) bar.style.transform = `translateX(${-crawlOffset}px)`;
  crawlRafId = requestAnimationFrame(stepCrawl);
}

function startCrawl() {
  if (crawlRafId) cancelAnimationFrame(crawlRafId);
  crawlLastTs = 0;
  crawlRafId = requestAnimationFrame(stepCrawl);
}

window.tickerControl = {
  start() {
    startCrawl();
  },
  stop() {
    if (crawlRafId) cancelAnimationFrame(crawlRafId);
    crawlRafId = 0;
  }
};

applyPreviewScale();
window.addEventListener('resize', applyPreviewScale);
startCrawl();
</script>
</body>
</html>
